<div class="container">
    <h2>我的記帳本</h2>
    
    <div class="input-group">
        <input type="text" id="description" placeholder="消費項目（如：午餐）">
        <input type="number" id="amount" placeholder="金額">
        <button onclick="addEntry()">新增</button>
    </div>

    <table id="list-table">
        <thead>
            <tr>
                <th>項目</th>
                <th>金額</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="entry-list">
            </tbody>
    </table>

    <div class="total-section">
        總計：$<span id="total-amount">0</span>
    </div>
</div>

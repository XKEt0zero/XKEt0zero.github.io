<!DOCTYPE html>
<html lang="zh-Hant-TW"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>網頁記帳</title> 
    <style>
        body {
            background-color: #d2e2e7;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }
        th {
            background-color: #f8f9fa;
        }
        .input-group {
            margin-bottom: 20px;
        }
        input {
            padding: 8px;
            margin: 5px;
        }
        .total-section {
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.2em;
            color: #2c3e50;
        }
        .delete-btn {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 3px;
        }
    </style>
</head> 
<body> 

    <h1>網頁記帳</h1>
    <p>在這個網站可以非常方便的記帳</p>
    
    <div class="container">
        <h2>我的記帳本</h2>
        
        <div class="input-group">
            <input type="text" id="description" placeholder="消費項目（如：午餐）">
            <input type="number" id="amount" placeholder="金額">
            <button onclick="addEntry()">新增</button>
        </div>
    
        <table id="list-table">
            <thead>
                <tr>
                    <th>項目</th>
                    <th>金額</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="entry-list">
                </tbody>
        </table>
    
        <div class="total-section">
            總計：$<span id="total-amount">0</span>
        </div>
    </div>

    <script>
        // 1. 初始化資料 (只宣告一次)
        let records = JSON.parse(localStorage.getItem('myExpenses')) || [];
        let total = 0;

        // 網頁一載入，就先把存好的資料畫出來
        renderTable();
        
        // 新增項目的函式
        function addEntry() {
            const descInput = document.getElementById('description');
            const amountInput = document.getElementById('amount');
        
            if (descInput.value === '' || amountInput.value === '') {
                alert("請輸入完整資訊喔！");
                return;
            }
        
            // 2. 建立新紀錄物件
            const newRecord = {
                id: Date.now(), // 用時間當作唯一身分證
                description: descInput.value,
                amount: parseFloat(amountInput.value)
            };
        
            // 3. 加入陣列並儲存
            records.push(newRecord);
            saveAndRender(); 
        
            // 4. 清空輸入框
            descInput.value = '';
            amountInput.value = '';
        }
        
        // 刪除項目的函式
        function deleteEntry(id) {
            // 過濾掉符合該 ID 的項目
            records = records.filter(record => record.id !== id);
            saveAndRender();
        }
        
        // 儲存到 LocalStorage 並重新繪製畫面
        function saveAndRender() {
            localStorage.setItem('myExpenses', JSON.stringify(records));
            renderTable();
        }
        
        // 繪製表格的函式
        function renderTable() {
            const list = document.getElementById('entry-list');
            const totalDisplay = document.getElementById('total-amount');
            
            list.innerHTML = ''; // 清空目前的 HTML 表格內容
            total = 0; // 重算總金額
        
            records.forEach(record => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${record.description}</td>
                    <td>${record.amount}</td>
                    <td><button class="delete-btn" onclick="deleteEntry(${record.id})">刪除</button></td>
                `;
                list.appendChild(row);
                total += record.amount;
            });
        
            totalDisplay.innerText = total;
        }
    </script>
</body>   
</html>

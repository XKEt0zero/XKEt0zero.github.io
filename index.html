<!DOCTYPE html>
<html lang="zh-Hant-TW"> 
    <head>
        <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
        <title>網頁記帳</title> 
    </head> 
    <style>
        body{
            background-color: #d2e2e7;}
    </style>
    <body> 
        <div style="text-align:center">
        <h1>網頁記帳</h1>
        <p>在這個網站可以非常方便的記帳</p>
        <style>
            table{
                border-collapse: collapse;
            }
            td{
                padding:40px;
            }
        </style>
        <table border=3>
        <tr>
            <td>日期</td>
            <td>項目</td>
            <td>收入</td>
            <td>支出</td>
            <td>總金額</td>
        </tr>
        <tr>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td><input type="text"></td>
            <td>?</td>
        </tr>
        </table>
        </div>
        
        <div class="container">
            <h2>我的記帳本</h2>
            
            <div class="input-group">
                <input type="text" id="description" placeholder="消費項目（如：午餐）">
                <input type="number" id="amount" placeholder="金額">
                <button onclick="addEntry()">新增</button>
            </div>
        
            <table id="list-table">
                <thead>
                    <tr>
                        <th>項目</th>
                        <th>金額</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="entry-list">
                    </tbody>
            </table>
        
            <div class="total-section">
                總計：$<span id="total-amount">0</span>
            </div>
        </div>


    </body>   
</html>

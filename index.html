<!DOCTYPE html>
<html lang="zh-Hant-TW"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>網頁記帳</title> 
    <style>
        body {
            background-color: #d2e2e7;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }
        th {
            background-color: #f8f9fa;
        }
        .input-group {
            margin-bottom: 20px;
        }
        input {
            padding: 8px;
            margin: 5px;
        }
        .total-section {
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.2em;
            color: #2c3e50;
        }
        .delete-btn {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 3px;
        }
    </style>
</head> 
<body> 

    <h1>網頁記帳</h1>
    <p>在這個網站可以非常方便的記帳</p>
    
    <div class="container">
        <h2>我的記帳本</h2>
        
        <div class="input-group">
            <input type="text" id="description" placeholder="消費項目（如：午餐）">
            <input type="number" id="amount" placeholder="金額">
            <button onclick="addEntry()">新增</button>
        </div>
    
        <table id="list-table">
            <thead>
                <tr>
                    <th>項目</th>
                    <th>金額</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="entry-list">
                </tbody>
        </table>
    
        <div class="total-section">
            總計：$<span id="total-amount">0</span>
        </div>
    </div>

    <script>
        let total = 0;

        function addEntry() {
            const descInput = document.getElementById('description');
            const amountInput = document.getElementById('amount');
            const list = document.getElementById('entry-list');
            const totalDisplay = document.getElementById('total-amount');
        
            if (descInput.value === '' || amountInput.value === '') {
                alert("請輸入完整資訊喔！");
                return;
            }
        
            const val = parseFloat(amountInput.value);

            // 建立新的表格列
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${descInput.value}</td>
                <td>${val}</td>
                <td><button class="delete-btn" onclick="deleteEntry(this, ${val})">刪除</button></td>
            `;
        
            list.appendChild(row);
        
            // 更新總金額
            total += val;
            totalDisplay.innerText = total;
        
            // 清空輸入框
            descInput.value = '';
            amountInput.value = '';
        }
        
        function deleteEntry(btn, amount) {
            const row = btn.parentNode.parentNode;
            row.remove();
            total -= amount;
            document.getElementById('total-amount').innerText = total;
        }
    </script>

</body>   
</html>
